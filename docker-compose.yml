version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vinayaka_postgres
    environment:
      POSTGRES_USER: vinayaka
      POSTGRES_PASSWORD: secure_password_change_in_prod
      POSTGRES_DB: vinayaka_transport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vinayaka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinayaka"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vinayaka_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vinayaka_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vinayaka_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vinayaka:secure_password_change_in_prod@postgres:5432/vinayaka_transport
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_in_production}
      PORT: 3001
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vinayaka_network
    restart: unless-stopped

  # Frontend Website
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vinayaka_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - vinayaka_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vinayaka_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - vinayaka_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  vinayaka_network:
    driver: bridge
